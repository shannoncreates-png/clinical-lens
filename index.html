                  </a>
                ) : (
                  <span key={i} className="inline-flex items-center px-2 py-1 rounded-md bg-slate-50 border border-edge font-num text-[11px] text-sub">{s.label}</span>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ============================================================
       RESEARCH TIMELINE — hand-drawn SVG
    ============================================================ */
    function ResearchTimeline({ data, allOneYear, onBroaden }) {
      if (!data || data.length < 2) {
        return (
          <div className="text-sm text-sub bg-slate-50 rounded-lg p-4 border border-edge">
            {allOneYear
              ? <>All retrieved studies share a single publication year, so there's no trend to plot yet — this usually means a newly emerging evidence base.</>
              : <>Not enough dated publications to plot a research trend.</>}
            {onBroaden && (
              <button onClick={onBroaden} className="ml-2 text-accent font-medium hover:underline">Broaden to most-recent results →</button>
            )}
          </div>
        );
      }
      const W = 760, H = 260, padL = 40, padR = 18, padT = 16, padB = 34;
      const years = data.map((d) => d.year);
      const minY = Math.min(...years), maxY = Math.max(...years);
      const maxC = Math.max(1, ...data.map((d) => d.studyCount));
      const sx = (yr) => padL + (maxY === minY ? 0 : (yr - minY) / (maxY - minY)) * (W - padL - padR);
      const sy = (c) => H - padB - (c / maxC) * (H - padT - padB);
      const pts = data.map((d) => [sx(d.year), sy(d.studyCount)]);
      const linePath = 'M ' + pts.map((p) => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' L ');
      const areaPath = `M ${pts[0][0].toFixed(1)},${H - padB} L ` + pts.map((p) => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' L ') + ` L ${pts[pts.length - 1][0].toFixed(1)},${H - padB} Z`;
      const yTickCount = Math.min(4, maxC);
      const yTicks = [];
      for (let i = 0; i <= yTickCount; i++) yTicks.push(Math.round((maxC / yTickCount) * i));
      const span = maxY - minY;
      const labelStep = Math.max(1, Math.ceil((span + 1) / 8));
      const xLabels = [];
      for (let yr = minY; yr <= maxY; yr += labelStep) xLabels.push(yr);
      if (xLabels[xLabels.length - 1] !== maxY) xLabels.push(maxY);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
          <defs>
            <linearGradient id="tlFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#0EA5E9" stopOpacity="0.30" />
              <stop offset="100%" stopColor="#0EA5E9" stopOpacity="0.02" />
            </linearGradient>
          </defs>
          {uniq(yTicks).map((t, i) => {
            const y = sy(t);
            return (
              <g key={i}>
                <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#E2E8F0" strokeDasharray="3 3" />
                <text x={padL - 8} y={y + 4} textAnchor="end" fontSize="11" fill="#475569" fontFamily="'JetBrains Mono', monospace">{t}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="url(#tlFill)" />
          <path d={linePath} fill="none" stroke="#1E40AF" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {pts.map((p, i) => (
            <circle key={i} className="tl-dot" cx={p[0]} cy={p[1]} r="2.6" fill="#1E40AF">
              <title>{data[i].year}: {data[i].studyCount} publication{data[i].studyCount === 1 ? '' : 's'}</title>
            </circle>
          ))}
          {xLabels.map((yr, i) => (
            <text key={i} x={sx(yr)} y={H - padB + 18} textAnchor="middle" fontSize="11" fill="#475569" fontFamily="'JetBrains Mono', monospace">{yr}</text>
          ))}
        </svg>
      );
    }

    /* ============================================================
       EVIDENCE PYRAMID — study-type composition (from PubMed tags)
    ============================================================ */
    function EvidencePyramid({ typeCounts }) {
      const tiers = EVIDENCE_TIERS.map((t) => ({ ...t, count: (typeCounts && typeCounts[t.key]) || 0 })).filter((t) => t.count > 0);
      if (tiers.length === 0) return null;
      const max = Math.max(...tiers.map((t) => t.count));
      return (
        <div className="space-y-2">
          {tiers.map((t) => {
            const pct = 34 + 66 * (t.count / max);
            return (
              <div key={t.key} className="flex items-center justify-center">
                <div className="rounded-lg flex items-center justify-between px-4 text-white shadow-card"
                  style={{ width: pct + '%', background: t.color, height: 38, minWidth: 200 }}>
                  <span className="text-xs sm:text-sm font-medium truncate">{t.label}</span>
                  <span className="font-num text-sm font-bold ml-3">{t.count}</span>
                </div>
              </div>
            );
          })}
          <p className="text-xs text-sub text-center mt-3">
            Publication types among {Object.values(typeCounts || {}).reduce((a, b) => a + b, 0)} retrieved studies, tagged by PubMed. Strongest evidence on top.
          </p>
        </div>
      );
    }

    /* ============================================================
       TRIAL STATUS DONUT
    ============================================================ */
    function statusBucket(s) {
      const u = String(s || '').toUpperCase();
      if (u.includes('RECRUIT') || u.includes('ENROLL')) return 'Recruiting';
      if (u.includes('ACTIVE')) return 'Active';
      if (u.includes('COMPLETED')) return 'Completed';
      if (u.includes('TERMINATED') || u.includes('WITHDRAWN') || u.includes('SUSPENDED')) return 'Stopped';
      return 'Other';
    }
    const STATUS_COLORS = { Recruiting: '#059669', Active: '#0EA5E9', Completed: '#1E40AF', Stopped: '#DC2626', Other: '#94A3B8' };

    function TrialStatusDonut({ trials }) {
      const counts = {};
      trials.forEach((t) => { const b = statusBucket(t.status); counts[b] = (counts[b] || 0) + 1; });
      const segments = Object.keys(counts).map((k) => ({ label: k, value: counts[k], color: STATUS_COLORS[k] }))
        .sort((a, b) => b.value - a.value);
      const total = segments.reduce((a, s) => a + s.value, 0);
      if (total === 0) return <p className="text-sm text-sub italic">No trial status data.</p>;
      const size = 168, thickness = 24, r = (size - thickness) / 2, c = size / 2, circ = 2 * Math.PI * r;
      let offset = 0;
      return (
        <div className="flex items-center gap-5 flex-wrap">
          <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{ flexShrink: 0 }}>
            <circle cx={c} cy={c} r={r} fill="none" stroke="#F1F5F9" strokeWidth={thickness} />
            {segments.map((s, i) => {
              const len = (s.value / total) * circ;
              const el = (
                <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth={thickness}
                  strokeDasharray={`${len} ${circ - len}`} strokeDashoffset={-offset}
                  transform={`rotate(-90 ${c} ${c})`} />
              );
              offset += len;
              return el;
            })}
            <text x={c} y={c - 4} textAnchor="middle" fontSize="26" fontWeight="700" fill="#0F172A" fontFamily="'JetBrains Mono', monospace">{total}</text>
            <text x={c} y={c + 16} textAnchor="middle" fontSize="11" fill="#475569">trials shown</text>
          </svg>
          <div className="space-y-1.5">
            {segments.map((s, i) => (
              <div key={i} className="flex items-center gap-2 text-sm">
                <span className="w-3 h-3 rounded-sm" style={{ background: s.color }}></span>
                <span className="text-ink">{s.label}</span>
                <span className="font-num text-sub">{s.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ============================================================
       ENROLLMENT BY TRIAL — horizontal bars
    ============================================================ */
    function EnrollmentBar({ trials }) {
      const rows = trials.filter((t) => t.enrollment && t.enrollment > 0)
        .sort((a, b) => b.enrollment - a.enrollment).slice(0, 8);
      if (rows.length === 0) return <p className="text-sm text-sub italic">No enrollment figures reported.</p>;
      const max = rows[0].enrollment;
      return (
        <div className="space-y-2.5">
          {rows.map((t) => (
            <div key={t.nctId}>
              <div className="flex items-center justify-between text-xs mb-1">
                <a href={`https://clinicaltrials.gov/study/${t.nctId}`} target="_blank" rel="noopener noreferrer" className="text-primary hover:underline truncate max-w-[70%]">{t.title}</a>
                <span className="font-num text-sub">{fmtInt(t.enrollment)}</span>
              </div>
              <div className="h-2.5 rounded-full bg-slate-100 overflow-hidden">
                <div className="h-full rounded-full" style={{ width: Math.max(4, (t.enrollment / max) * 100) + '%', background: '#1E40AF' }}></div>
              </div>
            </div>
          ))}
          <p className="text-xs text-sub mt-2">Top trials by reported enrollment — a sense of the scale of evidence.</p>
        </div>
      );
    }

    /* ============================================================
       TRIAL PIPELINE
    ============================================================ */
    function PhaseColumn({ title, count, summary, accent }) {
      return (
        <div className="rounded-xl border border-edge bg-white p-4 flex-1 min-w-0">
          <div className="flex items-center justify-between">
            <span className="text-sm font-semibold text-ink">{title}</span>
            <span className="font-num text-2xl font-bold" style={{ color: accent }}>{count}</span>
          </div>
          <div className="mt-2 h-1.5 rounded-full bg-slate-100 overflow-hidden">
            <div className="h-full rounded-full" style={{ width: count > 0 ? '100%' : '0%', background: accent, opacity: .85 }}></div>
          </div>
          {summary && <p className="text-xs text-sub mt-3 leading-relaxed">{summary}</p>}
        </div>
      );
    }

    function ctgovSearchUrl(parsed, recruitingOnly) {
      const p = new URLSearchParams();
      if (parsed && parsed.condition) p.set('cond', parsed.condition);
      if (parsed && parsed.drug) p.set('intr', parsed.drug);
      if (recruitingOnly) p.set('aggFilters', 'status:rec not');
      return `https://clinicaltrials.gov/search?${p.toString()}`;
    }

    function TrialTable({ trials, limit = 12 }) {
      const statusColor = (s) => {
        const u = String(s || '').toUpperCase();
        if (u.includes('RECRUIT')) return 'text-strong bg-emerald-50';
        if (u.includes('ACTIVE')) return 'text-accent bg-sky-50';
        if (u.includes('COMPLETED')) return 'text-primary bg-blue-50';
        if (u.includes('TERMINATED') || u.includes('WITHDRAWN') || u.includes('SUSPENDED')) return 'text-danger bg-red-50';
        return 'text-sub bg-slate-100';
      };
      const pretty = (s) => String(s || '').replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
      if (!trials || trials.length === 0) return null;
      return (
        <div className="overflow-x-auto rounded-xl border border-edge">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-50 text-left text-xs uppercase tracking-wide text-sub">
                <th className="px-4 py-3 font-semibold">Trial</th>
                <th className="px-4 py-3 font-semibold whitespace-nowrap">Phase</th>
                <th className="px-4 py-3 font-semibold whitespace-nowrap">Status</th>
                <th className="px-4 py-3 font-semibold whitespace-nowrap text-right">Enrollment</th>
              </tr>
            </thead>
            <tbody>
              {trials.slice(0, limit).map((t) => (
                <tr key={t.nctId} className="border-t border-edge hover:bg-slate-50/60">
                  <td className="px-4 py-3 max-w-md">
                    <a href={`https://clinicaltrials.gov/study/${t.nctId}`} target="_blank" rel="noopener noreferrer" className="text-primary hover:underline">
                      <span className="line-clamp-2">{t.title}</span>
                    </a>
                    <div className="font-num text-[11px] text-slate-400 mt-0.5">{t.nctId}</div>
                  </td>
                  <td className="px-4 py-3 whitespace-nowrap text-sub">{t.phase}</td>
                  <td className="px-4 py-3 whitespace-nowrap"><span className={`px-2 py-0.5 rounded text-[11px] font-medium ${statusColor(t.status)}`}>{pretty(t.status)}</span></td>
                  <td className="px-4 py-3 whitespace-nowrap text-right font-num text-sub">{fmtInt(t.enrollment)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function TrialGroup({ title, subtitle, trials, totalCount, moreUrl, accent }) {
      const shown = Math.min((trials || []).length, 12);
      return (
        <div>
          <div className="flex items-center justify-between gap-3 flex-wrap mb-1">
            <div className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: accent }}></span>
              <h4 className="font-display text-lg text-ink">{title}</h4>
              {totalCount != null && <span className="font-num text-xs text-sub bg-slate-100 px-2 py-0.5 rounded-full">{fmtInt(totalCount)}</span>}
            </div>
            {moreUrl && totalCount > shown && <a href={moreUrl} target="_blank" rel="noopener noreferrer" className="text-xs text-accent hover:underline">View all {fmtInt(totalCount)} on ClinicalTrials.gov →</a>}
          </div>
          {subtitle && <p className="text-sm text-sub mb-3">{subtitle}</p>}
          {(trials && trials.length) ? <TrialTable trials={trials} limit={12} /> : <p className="text-sm text-sub italic">None found in this search.</p>}
        </div>
      );
    }

    function PhaseRow({ trials, outcomesByPhase }) {
      const obp = outcomesByPhase || {};
      const counts = trials.reduce((acc, t) => { acc[t.bucket] = (acc[t.bucket] || 0) + 1; return acc; }, {});
      const pick = (a, b) => (a != null ? a : (b != null ? b : 0));
      const p12 = pick(obp.phase1_2 && obp.phase1_2.trialCount, counts.phase1_2);
      const p3 = pick(obp.phase3 && obp.phase3.trialCount, counts.phase3);
      const appr = pick(obp.approved && obp.approved.count, counts.approved);
      return (
        <div className="flex flex-col sm:flex-row gap-3">
          <PhaseColumn title="Phase 1 / 2" count={p12} summary={obp.phase1_2 && obp.phase1_2.summary} accent="#0EA5E9" />
          <PhaseColumn title="Phase 3" count={p3} summary={obp.phase3 && obp.phase3.summary} accent="#1E40AF" />
          <PhaseColumn title="Phase 4 / Approved" count={appr} summary={obp.approved && obp.approved.summary} accent="#059669" />
        </div>
      );
    }

    /* ============================================================
       PATIENT / RESEARCHER + KNOWLEDGE GAPS
    ============================================================ */
    function ListBlock({ items, color }) {
      if (!items || items.length === 0) return <p className="text-sm text-sub italic">No specific points were generated.</p>;
      return (
        <ul className="space-y-2.5">
          {items.map((t, i) => (
            <li key={i} className="flex items-start gap-2.5 text-sm text-ink leading-relaxed">
              <span className="mt-2 w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: color }}></span><span>{t}</span>
            </li>
          ))}
        </ul>
      );
    }

    function PatientResearcherPanel({ patient, researcher }) {
      return (
        <div className="grid md:grid-cols-2 gap-5">
          <div className="bg-white rounded-xl border border-edge shadow-card p-6">
            <div className="flex items-center gap-2 mb-4">
              <span className="w-9 h-9 rounded-lg bg-sky-50 text-accent flex items-center justify-center"><Icon name="users" className="w-5 h-5" /></span>
              <h3 className="font-display text-lg text-ink">For Patients &amp; Families</h3>
            </div>
            <ListBlock items={patient} color="#0EA5E9" />
          </div>
          <div className="bg-white rounded-xl border border-edge shadow-card p-6">
            <div className="flex items-center gap-2 mb-4">
              <span className="w-9 h-9 rounded-lg bg-blue-50 text-primary flex items-center justify-center"><Icon name="microscope" className="w-5 h-5" /></span>
              <h3 className="font-display text-lg text-ink">For Clinicians &amp; Researchers</h3>
            </div>
            <ListBlock items={researcher} color="#1E40AF" />
          </div>
        </div>
      );
    }

    function KnowledgeGaps({ gaps, highlight }) {
      if (!gaps || gaps.length === 0) return null;
      return (
        <div className={`rounded-xl border shadow-card p-6 ${highlight ? 'border-amber-200 bg-amber-50/60' : 'border-edge bg-white'}`}>
          <div className="flex items-center gap-2 mb-1">
            {highlight && <span className="text-warning"><Icon name="gap" className="w-5 h-5" /></span>}
            <h3 className="font-display text-lg text-ink">What we still don't know</h3>
          </div>
          <p className="text-sm text-sub mb-4">Where the published evidence is thin or missing — often the most useful section for advocates pushing for research.</p>
          <div className="grid sm:grid-cols-2 gap-3">
            {gaps.map((g, i) => (
              <div key={i} className="flex items-start gap-3 rounded-lg bg-white border border-edge px-4 py-3">
                <span className="font-num text-xs text-slate-400 mt-0.5">{String(i + 1).padStart(2, '0')}</span>
                <span className="text-sm text-ink leading-relaxed">{g}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ============================================================
       SOURCES PANEL
    ============================================================ */
    function SourcesPanel({ papers, trials, fetchedAt, fda }) {
      const total = papers.length + trials.length;
      return (
        <details className="bg-white rounded-xl border border-edge shadow-card overflow-hidden group">
          <summary className="flex items-center justify-between px-6 py-4 select-none">
            <div className="flex items-center gap-2">
              <Icon name="book" className="w-5 h-5 text-primary" />
              <span className="font-display text-lg text-ink">View all sources</span>
              <span className="font-num text-xs text-sub bg-slate-100 px-2 py-0.5 rounded-full">{total}</span>
            </div>
            <Icon name="chevron" className="w-5 h-5 text-sub transition-transform group-open:rotate-180" />
          </summary>
          <div className="px-6 pb-6 border-t border-edge pt-5">
            <div className="flex items-center gap-2 text-xs text-sub mb-5">
              <Icon name="clock" className="w-4 h-4" />
              <span>Data pulled live from PubMed, ClinicalTrials.gov, and OpenFDA on {fetchedAt}</span>
            </div>
            <div className="grid lg:grid-cols-2 gap-6">
              <div>
                <h4 className="text-sm font-semibold text-ink mb-3 flex items-center gap-2"><Icon name="book" className="w-4 h-4 text-primary" /> PubMed papers ({papers.length}, ranked by study quality)</h4>
                <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                  {papers.length === 0 && <p className="text-sm text-sub italic">No PubMed records returned.</p>}
                  {papers.slice(0, 60).map((p) => (
                    <div key={p.pmid} className="text-sm border-l-2 pl-3" style={{ borderColor: TIER[p.category] ? TIER[p.category].color : '#E2E8F0' }}>
                      <a href={`https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/`} target="_blank" rel="noopener noreferrer" className="text-primary hover:underline font-medium">{p.title}</a>
                      <div className="text-xs text-sub mt-0.5">{p.authors && <span>{p.authors} · </span>}<span className="italic">{p.journal}</span>{p.year ? ` · ${p.year}` : ''}</div>
                      <div className="font-num text-[11px] text-slate-400 mt-0.5">PMID {p.pmid}{p.category ? ` · ${TIER[p.category].label}` : ''}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <h4 className="text-sm font-semibold text-ink mb-3 flex items-center gap-2"><Icon name="flask" className="w-4 h-4 text-primary" /> ClinicalTrials.gov studies ({trials.length})</h4>
                <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                  {trials.length === 0 && <p className="text-sm text-sub italic">No registered trials returned.</p>}
                  {trials.map((t) => (
                    <div key={t.nctId} className="text-sm border-l-2 border-edge pl-3">
                      <a href={`https://clinicaltrials.gov/study/${t.nctId}`} target="_blank" rel="noopener noreferrer" className="text-primary hover:underline font-medium">{t.title}</a>
                      <div className="text-xs text-sub mt-0.5">{t.phase} · {String(t.status || '').replace(/_/g, ' ').toLowerCase()}</div>
                      <div className="font-num text-[11px] text-slate-400 mt-0.5">{t.nctId}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            {fda && (
              <div className="mt-6 pt-5 border-t border-edge">
                <h4 className="text-sm font-semibold text-ink mb-2">OpenFDA adverse-event reports — {fda.drug}</h4>
                <p className="text-xs text-sub mb-3">{fmtInt(fda.totalReports)} total FAERS reports{fda.seriousCount != null ? `, ${fmtInt(fda.seriousCount)} flagged serious` : ''}. Most frequently reported reactions:</p>
                <div className="flex flex-wrap gap-2">
                  {fda.topReactions.map((r, i) => (
                    <span key={i} className="font-num text-[11px] px-2 py-1 rounded bg-slate-50 border border-edge text-sub">{String(r.term || '').toLowerCase()} <span className="text-slate-400">· {fmtInt(r.count)}</span></span>
                  ))}
                </div>
              </div>
            )}
          </div>
        </details>
      );
    }

    /* ============================================================
       ADVERSE EVENTS BAR (OpenFDA)
    ============================================================ */
    function AdverseEventBar({ fda }) {
      if (!fda || !fda.topReactions || fda.topReactions.length === 0) return null;
      const rows = fda.topReactions.slice(0, 10);
      const max = Math.max(...rows.map((r) => r.count));
      return (
        <div className="bg-white rounded-xl border border-edge shadow-card p-6">
          <h3 className="font-display text-lg text-ink mb-1">Reported adverse events — {fda.drug}</h3>
          <p className="text-sm text-sub mb-4">
            Most-reported reactions across {fmtInt(fda.totalReports)} OpenFDA (FAERS) reports
            {fda.seriousCount != null ? `, ${fmtInt(fda.seriousCount)} flagged serious` : ''}.
            <span className="text-warning"> These are voluntary reports — counts reflect reporting frequency, not incidence or causation.</span>
          </p>
          <div className="space-y-2.5">
            {rows.map((r, i) => (
              <div key={i}>
                <div className="flex items-center justify-between text-xs mb-1">
                  <span className="text-ink capitalize">{String(r.term || '').toLowerCase()}</span>
                  <span className="font-num text-sub">{fmtInt(r.count)}</span>
                </div>
                <div className="h-2.5 rounded-full bg-slate-100 overflow-hidden">
                  <div className="h-full rounded-full" style={{ width: Math.max(4, (r.count / max) * 100) + '%', background: '#D97706' }}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ============================================================
       DISCLAIMER / ERROR / ABOUT / SECTION
    ============================================================ */
    function Disclaimer({ text, limitations }) {
      return (
        <div className="rounded-xl border border-amber-200 bg-amber-50 p-5">
          {limitations && (
            <div className="mb-4">
              <h4 className="text-sm font-semibold text-amber-900 mb-1">Data limitations</h4>
              <p className="text-sm text-amber-800 leading-relaxed">{limitations}</p>
            </div>
          )}
          <div className="flex items-start gap-2">
            <span className="text-warning mt-0.5 flex-shrink-0"><Icon name="alert" className="w-4 h-4" /></span>
            <p className="text-xs text-amber-800 leading-relaxed">{text || 'This synthesis is for informational purposes only and does not constitute medical advice. Consult a qualified healthcare provider for any medical decisions.'}</p>
          </div>
        </div>
      );
    }

    function ErrorState({ title, message, onRetry, suggestions, onPick }) {
      return (
        <div className="max-w-2xl mx-auto mt-10 bg-white rounded-2xl border border-edge shadow-card p-8 text-center fade-up">
          <div className="w-12 h-12 mx-auto rounded-full bg-amber-50 text-warning flex items-center justify-center mb-4"><Icon name="alert" className="w-6 h-6" /></div>
          <h3 className="font-display text-xl text-ink mb-2">{title}</h3>
          <p className="text-sm text-sub leading-relaxed max-w-md mx-auto">{message}</p>
          {suggestions && suggestions.length > 0 && (
            <div className="mt-5 flex flex-wrap justify-center gap-2">
              {suggestions.map((s) => (
                <button key={s} onClick={() => onPick && onPick(s)} className="px-3 py-1.5 rounded-full border border-edge bg-white text-xs font-medium text-sub hover:border-accent hover:text-primary transition">{s}</button>
              ))}
            </div>
          )}
          {onRetry && <button onClick={onRetry} className="mt-6 h-10 px-5 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-blue-800 transition">Try again</button>}
        </div>
      );
    }

    function About() {
      return (
        <details className="bg-white rounded-xl border border-edge shadow-card overflow-hidden group">
          <summary className="flex items-center justify-between px-6 py-4 select-none">
            <div className="flex items-center gap-2"><Icon name="info" className="w-5 h-5 text-primary" /><span className="font-display text-lg text-ink">About ClinicalLens &amp; our methodology</span></div>
            <Icon name="chevron" className="w-5 h-5 text-sub transition-transform group-open:rotate-180" />
          </summary>
          <div className="px-6 pb-6 border-t border-edge pt-5 text-sm text-sub leading-relaxed space-y-3">
            <p>ClinicalLens queries public biomedical databases live and uses Claude to synthesize the results into a sourced, plain-language statistical summary. It works for <span className="font-medium text-ink">any</span> drug, disease, condition, or treatment — and can compare two treatments side by side.</p>
            <div>
              <span className="font-semibold text-ink">Data sources (all free, public APIs):</span>
              <ul className="list-disc ml-5 mt-1 space-y-1">
                <li><span className="font-medium text-ink">PubMed</span> via NCBI E-utilities — up to 200 records plus a guaranteed pull of systematic reviews, meta-analyses & guidelines, ranked by study quality; open-access full text is read for the top papers, and the research timeline uses true full-corpus counts per year.</li>
                <li><span className="font-medium text-ink">ClinicalTrials.gov</span> (v2 API) — registered trials.</li>
                <li><span className="font-medium text-ink">OpenFDA</span> (FAERS) — post-market adverse-event reports, searched across generic, brand, and substance names.</li>
              </ul>
            </div>
            <p><span className="font-semibold text-ink">Accuracy guardrails:</span> Every chart is computed directly from retrieved data, never inferred. The synthesis model cites only PMIDs and NCT numbers present in the retrieved data, never invents statistics, and always shows study quality and sample size. The evidence pyramid uses PubMed's own publication-type tags; timeline counts are computed from the returned records.</p>
            <p><span className="font-semibold text-ink">Privacy &amp; keys:</span> Claude requests are proxied through a small serverless backend, so the Anthropic API key stays on the server and is never exposed to your browser.</p>
            <p className="text-xs text-slate-400">ClinicalLens is an informational tool and is not a substitute for professional medical advice.</p>
          </div>
        </details>
      );
    }

    function Section({ title, subtitle, children, icon }) {
      return (
        <section className="fade-up">
          <div className="mb-4">
            <h2 className="font-display text-2xl text-ink flex items-center gap-2">{icon && <Icon name={icon} className="w-5 h-5 text-primary" />}{title}</h2>
            {subtitle && <p className="text-sm text-sub mt-1">{subtitle}</p>}
          </div>
          {children}
        </section>
      );
    }

    function Card({ title, icon, children }) {
      return (
        <div className="bg-white rounded-xl border border-edge shadow-card p-6">
          <h3 className="font-display text-lg text-ink mb-4 flex items-center gap-2">{icon && <Icon name={icon} className="w-5 h-5 text-primary" />}{title}</h3>
          {children}
        </div>
      );
    }

    /* ============================================================
       SCIENTIFIC PROFILE COMPONENTS (disease / drug layouts)
    ============================================================ */
    const NO_DETAIL = 'The retrieved literature does not provide sufficient detail on this aspect.';

    function SourceChips({ ids }) {
      const list = uniq((ids || []).map((x) => String(x).trim()).filter(Boolean));
      if (!list.length) return null;
      return (
        <div className="flex flex-wrap gap-2 mt-3">
          {list.map((raw, i) => {
            const s = sourceLink(raw);
            return s.url ? (
              <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-slate-50 border border-edge font-num text-[11px] text-primary hover:bg-blue-50 hover:border-accent transition">{s.label}<Icon name="external" className="w-3 h-3" /></a>
            ) : (
              <span key={i} className="px-2 py-1 rounded-md bg-slate-50 border border-edge font-num text-[11px] text-sub">{s.label}</span>
            );
          })}
        </div>
      );
    }

    function Sub({ title, body }) {
      return (
        <div>
          <h4 className="text-sm font-semibold text-ink mb-1">{title}</h4>
          <p className="text-sm text-sub leading-relaxed">{body || NO_DETAIL}</p>
        </div>
      );
    }

    function PlainTechToggle({ title, plain, technical }) {
      const [tech, setTech] = useState(false);
      return (
        <div>
          <div className="flex items-center justify-between mb-2 gap-3 flex-wrap">
            <h4 className="text-sm font-semibold text-ink">{title}</h4>
            <div className="inline-flex rounded-lg border border-edge overflow-hidden text-xs">
              <button onClick={() => setTech(false)} className={`px-2.5 py-1 font-medium ${!tech ? 'bg-primary text-white' : 'bg-white text-sub hover:text-primary'}`}>Plain</button>
              <button onClick={() => setTech(true)} className={`px-2.5 py-1 font-medium ${tech ? 'bg-primary text-white' : 'bg-white text-sub hover:text-primary'}`}>Technical</button>
            </div>
          </div>
          <p className="text-sm text-sub leading-relaxed">{(tech ? technical : plain) || NO_DETAIL}</p>
        </div>
      );
    }

    function OverviewCard({ name, kind, overview }) {
      const [open, setOpen] = useState(false);
      if (!overview) return null;
      return (
        <div className="bg-white rounded-xl border border-edge shadow-card p-6 fade-up">
          <div className="flex items-center gap-2.5 mb-3">
            <span className="w-9 h-9 rounded-lg bg-blue-50 text-primary flex items-center justify-center"><Icon name={kind === 'disease' ? 'dna' : 'pill'} className="w-5 h-5" /></span>
            <h2 className="font-display text-2xl text-ink capitalize">About {name}</h2>
          </div>
          <p className="text-base text-ink leading-relaxed">{overview.plainSummary || NO_DETAIL}</p>
          <button onClick={() => setOpen(!open)} className="mt-3 inline-flex items-center gap-1 text-sm font-medium text-accent hover:underline">
            {open ? 'Hide scientific breakdown' : 'Full scientific breakdown'}<Icon name="chevron" className={`w-4 h-4 transition-transform ${open ? 'rotate-180' : ''}`} />
          </button>
          {open && (
            <div className="mt-5 space-y-5 border-t border-edge pt-5">
              {kind === 'disease' ? (
                <>
                  <PlainTechToggle title="How it works in the body" plain={overview.whatGoesWrong} technical={overview.mechanismDeep} />
                  <Sub title="Who gets it" body={overview.whoGetsIt} />
                  <Sub title="How it's diagnosed" body={overview.howDiagnosed} />
                  <Sub title="Current scientific understanding" body={overview.currentUnderstanding} />
                </>
              ) : (
                <>
                  <PlainTechToggle title="How it works" plain={overview.mechanismOfAction} technical={overview.mechanismDeep} />
                  <Sub title="How it moves through the body" body={overview.pharmacokinetics} />
                  <Sub title="Development &amp; history" body={overview.developmentContext} />
                  <Sub title="Current scientific understanding" body={overview.currentUnderstanding} />
                </>
              )}
              <SourceChips ids={overview.sourceIds} />
            </div>
          )}
          <p className="text-xs text-slate-400 mt-4">Overview reflects the most current understanding found in retrieved literature. This is scientific background, not medical advice.</p>
        </div>
      );
    }

    function TreatmentCard({ t }) {
      return (
        <div className="rounded-xl border border-edge bg-white p-4">
          <div className="font-semibold text-ink">{t.name}</div>
          {t.mechanismBrief && <div className="text-sm italic text-sub mt-0.5">{t.mechanismBrief}</div>}
          {t.evidenceBasis && <div className="text-sm text-ink mt-2"><span className="font-medium">Evidence: </span>{t.evidenceBasis}</div>}
          {t.typicalUse && <div className="text-sm text-sub mt-1"><span className="font-medium text-ink">Typical use: </span>{t.typicalUse}</div>}
          {t.caveat && (
            <div className="mt-2 flex items-start gap-2 rounded-lg bg-amber-50 border border-amber-200 px-3 py-2">
              <span className="text-warning mt-0.5"><Icon name="alert" className="w-4 h-4" /></span>
              <p className="text-xs text-amber-800 leading-relaxed">{t.caveat}</p>
            </div>
          )}
          <SourceChips ids={t.sourceIds} />
        </div>
      );
    }

    function Tier({ tier, defaultOpen }) {
      const [open, setOpen] = useState(!!defaultOpen);
      const list = (tier && tier.treatments) || [];
      const enough = list.length >= 2;
      return (
        <div className="rounded-xl border border-edge bg-white overflow-hidden">
          <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between px-5 py-3.5 text-left">
            <span className="font-semibold text-ink">{tier.label} <span className="font-num text-sm text-sub">({enough ? list.length : 0})</span></span>
            <Icon name="chevron" className={`w-5 h-5 text-sub transition-transform ${open ? 'rotate-180' : ''}`} />
          </button>
          {open && (
            <div className="px-5 pb-5 border-t border-edge pt-4 space-y-3">
              {tier.description && <p className="text-sm text-sub">{tier.description}</p>}
              {enough ? list.map((t, i) => <TreatmentCard key={i} t={t} />) : <p className="text-sm text-sub italic">Insufficient data retrieved for this tier.</p>}
            </div>
          )}
        </div>
      );
    }

    function TreatmentTiers({ tiers }) {
      if (!tiers) return null;
      const t1 = tiers.tierOne || { label: 'Most established in the evidence', treatments: [] };
      const t2 = tiers.tierTwo || { label: 'Used in specific circumstances or second-line', treatments: [] };
      const t3 = tiers.tierThree || { label: 'Emerging, experimental, or less commonly used', treatments: [] };
      return (
        <Section title="Treatments &amp; interventions" subtitle="Organized by how commonly and consistently they appear across the retrieved evidence." icon="flask">
          <div className="rounded-xl border border-amber-200 bg-amber-50 p-4 mb-4 text-sm text-amber-800 leading-relaxed">
            This ranking reflects how frequently and consistently treatments appear across the retrieved published evidence — <span className="font-semibold">not</span> a recommendation of what any individual patient should use. Treatment decisions depend on individual factors only a clinician can evaluate.
          </div>
          <div className="space-y-3">
            <Tier tier={t1} defaultOpen />
            <Tier tier={t2} />
            <Tier tier={t3} />
          </div>
          {tiers.tierRationale && <p className="text-xs text-slate-400 mt-3">{tiers.tierRationale}</p>}
        </Section>
      );
    }

    function UseRow({ indication, context, ids, badge }) {
      const C = { strong: '#059669', moderate: '#CA8A04', limited: '#D97706', anecdotal: '#94A3B8' };
      return (
        <div className="rounded-lg border border-edge bg-slate-50 px-4 py-3">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-ink">{indication}</span>
            {badge && <span className="text-[11px] font-semibold px-2 py-0.5 rounded bg-white" style={{ color: C[badge] || '#475569' }}>{badge} evidence</span>}
          </div>
          {context && <p className="text-sm text-sub mt-1 leading-relaxed">{context}</p>}
          <SourceChips ids={ids} />
        </div>
      );
    }

    function DrugUses({ uses }) {
      const [tab, setTab] = useState('fda');
      if (!uses) return null;
      const fda = uses.fdaApproved || [], off = uses.commonOffLabel || [], inv = uses.underInvestigation || [];
      const tabs = [['fda', `FDA Approved (${fda.length})`], ['off', `Off-Label (${off.length})`], ['inv', `Under Investigation (${inv.length})`]];
      return (
        <Section title="What this drug is used for" icon="pill">
          <div className="bg-white rounded-xl border border-edge shadow-card p-6">
            <div className="flex flex-wrap gap-2 mb-4">
              {tabs.map(([k, l]) => (
                <button key={k} onClick={() => setTab(k)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${tab === k ? 'bg-primary text-white' : 'bg-slate-50 text-sub border border-edge hover:text-primary'}`}>{l}</button>
              ))}
            </div>
            {tab === 'fda' && (fda.length
              ? <div className="space-y-3">{fda.map((u, i) => <UseRow key={i} indication={u.indication} context={u.approvalContext} ids={u.sourceIds} />)}</div>
              : <p className="text-sm text-sub">FDA approval status could not be confirmed from the retrieved literature. <a href="https://www.accessdata.fda.gov/scripts/cder/daf/" target="_blank" rel="noopener noreferrer" className="text-accent hover:underline">Verify at fda.gov →</a></p>)}
            {tab === 'off' && (off.length
              ? <div className="space-y-3">{off.map((u, i) => <UseRow key={i} indication={u.indication} context={u.useContext} ids={u.sourceIds} badge={u.evidenceLevel} />)}</div>
              : <p className="text-sm text-sub italic">No off-label uses surfaced in the retrieved literature.</p>)}
            {tab === 'inv' && (inv.length
              ? <div className="space-y-3">{inv.map((u, i) => <UseRow key={i} indication={u.indication} context={u.trialContext} ids={u.sourceIds} />)}</div>
              : <p className="text-sm text-sub italic">No active investigational uses surfaced in the retrieved trials.</p>)}
            <p className="text-xs text-slate-400 mt-4">{uses.usesDisclaimer || 'This list reflects uses documented in retrieved published literature and may not be complete. FDA approval status should be verified at fda.gov.'}</p>
          </div>
        </Section>
      );
    }

    function SearchTypeToggle({ value, onChange, rationale }) {
      return (
        <div className="rounded-xl border border-edge bg-white shadow-card p-4 flex items-center gap-3 flex-wrap">
          <span className="text-sm text-sub">{rationale || 'This term could be a disease or a drug.'} Show it as:</span>
          <div className="inline-flex rounded-lg border border-edge overflow-hidden">
            <button onClick={() => onChange('disease')} className={`px-3 py-1.5 text-sm font-medium ${value === 'disease' ? 'bg-primary text-white' : 'bg-white text-sub hover:text-primary'}`}>Disease</button>
            <button onClick={() => onChange('drug')} className={`px-3 py-1.5 text-sm font-medium ${value === 'drug' ? 'bg-primary text-white' : 'bg-white text-sub hover:text-primary'}`}>Drug</button>
          </div>
        </div>
      );
    }

    /* ============================================================
       SINGLE-TOPIC DASHBOARD
    ============================================================ */
    function Dashboard({ query, synthesis, raw, profile, searchType, sortMode, onSort, onBroaden }) {
      const [viewType, setViewType] = useState(searchType === 'ambiguous' ? 'disease' : (searchType || 'disease'));
      const effectiveType = searchType === 'ambiguous' ? viewType : (searchType || 'disease');
      const diseaseName = raw.parsed.condition;
      const drugName = raw.parsed.drug || raw.parsed.condition;
      const timeline = (raw.fullTimeline && raw.fullTimeline.length >= 2) ? raw.fullTimeline : raw.computedTimeline;
      const allOneYear = (!raw.fullTimeline || raw.fullTimeline.length < 2) && raw.pubmed.papers.length > 0 && uniq(raw.pubmed.papers.map((p) => p.year).filter(Boolean)).length <= 1;
      const stats = synthesis.keyStatistics || [];
      const trials = raw.trials.studies;
      const isEnrolling = (s) => { const u = String(s || '').toUpperCase(); return u.includes('RECRUIT') || u.includes('ENROLL') || u.includes('AVAILABLE'); };
      const completedTrials = trials.filter((t) => !isEnrolling(t.status));
      return (
        <div className="space-y-10 mt-8">
          {/* Header */}
          <section className="fade-up">
            <div className="flex items-start justify-between gap-4 flex-wrap">
              <div>
                <div className="text-xs font-medium uppercase tracking-wide text-sub mb-1">Evidence synthesis for</div>
                <h1 className="font-display text-3xl sm:text-4xl text-ink leading-tight">{query}</h1>
              </div>
              <EvidenceBadge strength={synthesis.evidenceStrength} />
            </div>
            <p className="font-display text-lg sm:text-xl text-ink leading-relaxed mt-4 max-w-3xl">{synthesis.toplineSummary}</p>
            {synthesis.evidenceRationale && <p className="text-sm text-sub mt-2"><span className="font-semibold">Why this rating: </span>{synthesis.evidenceRationale}</p>}
            {(raw.pubmed.count + raw.trials.count) < 5 && (
              <div className="mt-4 inline-flex items-center gap-2 rounded-lg bg-red-50 border border-red-200 px-3 py-2 text-sm text-danger">
                <Icon name="alert" className="w-4 h-4" /> Very limited evidence base — interpret with caution.
              </div>
            )}
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6">
              <StatCard label="Studies Found" value={fmtInt(raw.pubmed.totalAvailable || synthesis.totalStudiesFound)} icon="book" />
              <StatCard label="Clinical Trials" value={fmtInt(synthesis.totalTrialsFound != null ? synthesis.totalTrialsFound : raw.trials.count)} icon="flask" />
              <StatCard label="Est. Patients Studied" value={fmtInt(synthesis.totalPatientsAcrossStudies)} icon="users" />
            </div>
            <p className="text-xs text-sub mt-3 max-w-3xl leading-relaxed">
              {raw.pubmed.count >= raw.pubmed.totalAvailable
                ? `Analyzed all ${fmtInt(raw.pubmed.count)} matching PubMed records`
                : `Analyzed the top ${fmtInt(raw.pubmed.count)} of ${fmtInt(raw.pubmed.totalAvailable)} matching PubMed records, ranked by study quality`}
              {(raw.pubmed.abstractPmids && raw.pubmed.abstractPmids.length > 0) ? `, with full abstracts read for the ${fmtInt(raw.pubmed.abstractPmids.length)} strongest` : ''}. This is a rapid evidence scan, not a systematic review — see all sources below.
            </p>
            <div className="mt-4 flex items-center gap-2 text-xs text-sub">
              <span>Ranking:</span>
              <div className="inline-flex rounded-lg border border-edge overflow-hidden">
                <button onClick={() => onSort('relevance')} className={`px-3 py-1.5 font-medium ${sortMode === 'relevance' ? 'bg-primary text-white' : 'bg-white text-sub hover:text-primary'}`}>Best match</button>
                <button onClick={() => onSort('date')} className={`px-3 py-1.5 font-medium ${sortMode === 'date' ? 'bg-primary text-white' : 'bg-white text-sub hover:text-primary'}`}>Most recent</button>
              </div>
              <span className="text-slate-400">— "Best match" reduces recency bias by surfacing foundational studies too.</span>
            </div>
          </section>

          {/* Scientific profile — disease / drug / combination layouts (drug first for combinations) */}
          {profile && searchType === 'ambiguous' && <SearchTypeToggle value={viewType} onChange={setViewType} rationale={raw.parsed.searchTypeRationale} />}
          {profile && (effectiveType === 'combination' || effectiveType === 'drug') && <OverviewCard name={drugName} kind="drug" overview={profile.drugOverview} />}
          {profile && (effectiveType === 'combination' || effectiveType === 'drug') && <DrugUses uses={profile.drugUses} />}
          {profile && (effectiveType === 'combination' || effectiveType === 'disease') && <OverviewCard name={diseaseName} kind="disease" overview={profile.diseaseOverview} />}
          {profile && (effectiveType === 'combination' || effectiveType === 'disease') && <TreatmentTiers tiers={profile.treatmentTiers} />}

          {/* What we still don't know — kept elevated, just below the new context sections */}
          <KnowledgeGaps gaps={synthesis.knowledgeGaps} highlight />

          {/* Key statistics */}
          {stats.length > 0 && (
            <Section title="Key statistics" subtitle="Each figure is traceable to its source. The left border signals study quality at a glance." icon="search">
              <div className="grid md:grid-cols-2 gap-5">{stats.map((s, i) => <KeyStatisticCard key={i} stat={s} />)}</div>
            </Section>
          )}

          {/* 1. Trial access — "Can I join a trial / is it available?" Recruiting-first. */}
          <Section title="Clinical trials & access" subtitle="Trials you might be able to join come first, then completed studies and the overall landscape." icon="flask">
            <div className="grid lg:grid-cols-3 gap-5">
              <div className="lg:col-span-2 space-y-6">
                <TrialGroup title="Recruiting & upcoming" subtitle="May be accepting participants — always confirm eligibility with the study team on ClinicalTrials.gov." trials={raw.trials.recruiting} totalCount={raw.trials.recruitingCount} moreUrl={ctgovSearchUrl(raw.parsed, true)} accent="#059669" />
                <TrialGroup title="Completed & closed" subtitle="Finished, terminated, or no-longer-enrolling trials — the outcomes evidence base." trials={completedTrials} totalCount={raw.trials.count} moreUrl={ctgovSearchUrl(raw.parsed, false)} accent="#1E40AF" />
              </div>
              <Card title="Trial status"><TrialStatusDonut trials={trials} /></Card>
            </div>
            <div className="mt-5"><PhaseRow trials={trials} outcomesByPhase={synthesis.outcomesByPhase} /></div>
          </Section>

          {/* 2. Safety — "Is it safe?" (drug queries) */}
          <AdverseEventBar fda={raw.fda} />

          {/* 3. Evidence strength — "How strong is the evidence?" */}
          {Object.keys(raw.pubmed.typeCounts || {}).length > 0 && (
            <Section title="Evidence quality mix" subtitle="What kinds of studies make up this evidence base — a quick read on how strong the literature is." icon="layers">
              <div className="bg-white rounded-xl border border-edge shadow-card p-6"><EvidencePyramid typeCounts={raw.pubmed.typeCounts} /></div>
            </Section>
          )}

          {/* 4. Research landscape (secondary detail): trend over time + trial scale */}
          <Section title="Research landscape" subtitle="Secondary context — how much research exists over time, and the scale of the trials.">
            <div className="grid lg:grid-cols-2 gap-5">
              <Card title="Research over time">
                <ResearchTimeline data={timeline} allOneYear={allOneYear} onBroaden={onBroaden} />
                <p className="text-xs text-sub mt-2">{`Publications per year for all ${fmtInt(raw.pubmed.totalAvailable)} studies on this topic — the full PubMed timeline (last 30 years).`}</p>
              </Card>
              <Card title="Largest trials by enrollment" icon="bars"><EnrollmentBar trials={trials} /></Card>
            </div>
          </Section>

          {/* Two perspectives */}
          <Section title="Two perspectives">
            <PatientResearcherPanel patient={synthesis.patientConsiderations} researcher={synthesis.researcherNotes} />
          </Section>

          <Disclaimer text={synthesis.disclaimer} limitations={synthesis.dataLimitations} />
          <SourcesPanel papers={raw.pubmed.papers} trials={raw.trials.studies} fetchedAt={raw.fetchedAt} fda={raw.fda} />
          <About />
        </div>
      );
    }

    /* ============================================================
       COMPARISON DASHBOARD
    ============================================================ */
    function ComparisonColumn({ arm }) {
      const { parsed, synthesis, raw } = arm;
      const trials = raw.trials.studies;
      const stats = (synthesis.keyStatistics || []).slice(0, 5);
      return (
        <div className="space-y-5">
          <div className="bg-white rounded-xl border border-edge shadow-card p-5">
            <div className="flex items-start justify-between gap-3 flex-wrap">
              <h3 className="font-display text-2xl text-ink capitalize">{labelOf(parsed)}</h3>
              <EvidenceBadge strength={synthesis.evidenceStrength} />
            </div>
            <p className="text-sm text-ink leading-relaxed mt-3">{synthesis.toplineSummary}</p>
            <div className="grid grid-cols-3 gap-2 mt-4">
              {[['Studies', synthesis.totalStudiesFound != null ? synthesis.totalStudiesFound : raw.pubmed.totalAvailable],
                ['Trials', synthesis.totalTrialsFound != null ? synthesis.totalTrialsFound : raw.trials.count],
                ['Patients', synthesis.totalPatientsAcrossStudies]].map(([l, v], i) => (
                <div key={i} className="rounded-lg bg-slate-50 border border-edge px-3 py-2 text-center">
                  <div className="font-num text-lg font-bold text-ink">{fmtInt(v)}</div>
                  <div className="text-[11px] text-sub">{l}</div>
                </div>
              ))}
            </div>
            <p className="text-[11px] text-sub mt-2 leading-relaxed">
              {raw.pubmed.count >= raw.pubmed.totalAvailable ? `All ${fmtInt(raw.pubmed.count)} records` : `Top ${fmtInt(raw.pubmed.count)} of ${fmtInt(raw.pubmed.totalAvailable)} records`} analyzed · {fmtInt(raw.pubmed.abstractPmids ? raw.pubmed.abstractPmids.length : 0)} full abstracts read
            </p>
          </div>

          {stats.length > 0 && <div className="space-y-4">{stats.map((s, i) => <KeyStatisticCard key={i} stat={s} />)}</div>}

          {Object.keys(raw.pubmed.typeCounts || {}).length > 0 && (
            <Card title="Evidence quality mix" icon="layers"><EvidencePyramid typeCounts={raw.pubmed.typeCounts} /></Card>
          )}

          <Card title="Trial status"><TrialStatusDonut trials={trials} /></Card>

          {(synthesis.knowledgeGaps || []).length > 0 && (
            <Card title="What we still don't know" icon="gap">
              <ListBlock items={(synthesis.knowledgeGaps || []).slice(0, 5)} color="#D97706" />
            </Card>
          )}

          <AdverseEventBar fda={raw.fda} />
          <SourcesPanel papers={raw.pubmed.papers} trials={raw.trials.studies} fetchedAt={raw.fetchedAt} fda={raw.fda} />
        </div>
      );
    }

    function ComparisonDashboard({ query, arms }) {
      const a = arms[0], b = arms[1];
      return (
        <div className="space-y-8 mt-8">
          <section className="fade-up">
            <div className="text-xs font-medium uppercase tracking-wide text-sub mb-1 flex items-center gap-2"><Icon name="scale" className="w-4 h-4" /> Side-by-side evidence comparison</div>
            <h1 className="font-display text-3xl sm:text-4xl text-ink leading-tight capitalize">{labelOf(a.parsed)} <span className="text-sub font-sans text-2xl">vs</span> {labelOf(b.parsed)}</h1>
            <p className="text-sm text-sub mt-2">Each side is synthesized independently from its own live PubMed / ClinicalTrials.gov / OpenFDA pull. Compare like-for-like — sample sizes and study designs differ between arms.</p>
          </section>
          <div className="grid lg:grid-cols-2 gap-6 items-start">
            <ComparisonColumn arm={a} />
            <ComparisonColumn arm={b} />
          </div>
          <Disclaimer />
          <About />
        </div>
      );
    }

    /* ============================================================
       APP
    ============================================================ */
    const SINGLE_STEPS = [
      { label: 'Parsing your query with AI', status: 'pending', detail: '' },
      { label: 'Searching PubMed (ranking by study quality)', status: 'pending', detail: '' },
      { label: 'Searching ClinicalTrials.gov & OpenFDA', status: 'pending', detail: '' },
      { label: 'Building scientific overview', status: 'pending', detail: '' },
      { label: 'Running statistical synthesis', status: 'pending', detail: '' },
    ];

    function App() {
      const [phase, setPhase] = useState('idle'); // idle | loading | done | compare | nodata | error
      const [steps, setSteps] = useState(SINGLE_STEPS);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [query, setQuery] = useState('');
      const [sortMode, setSortMode] = useState('relevance');
      const lastQuery = useRef('');

      const updateStep = useCallback((idx, status, detail) => {
        setSteps((prev) => prev.map((s, i) => i === idx ? { ...s, status, detail: detail !== undefined ? detail : s.detail } : s));
      }, []);

      const runSearch = useCallback(async (raw, opts = {}) => {
        const sort = opts.sort || 'relevance';
        lastQuery.current = raw;
        setQuery(raw); setError(null); setResult(null);
        setSortMode(sort);
        setPhase('loading');

        try {
          setSteps(SINGLE_STEPS.map((s) => ({ ...s, status: 'pending', detail: '' })));
          updateStep(0, 'active');
          const parsed = await parseQuery(raw);
          const isComparison = parsed && parsed.comparison && Array.isArray(parsed.arms) && parsed.arms.length >= 2 && parsed.arms.every((a) => a && a.condition);

          if (isComparison) {
            const a = parsed.arms[0], b = parsed.arms[1];
            const la = labelOf(a), lb = labelOf(b);
            setSteps([
              { label: 'Parsing your comparison', status: 'done', detail: `${la} vs ${lb}` },
              { label: `Researching & synthesizing ${la}`, status: 'active', detail: '' },
              { label: `Researching & synthesizing ${lb}`, status: 'active', detail: '' },
              { label: 'Building side-by-side comparison', status: 'pending', detail: '' },
            ]);
            const [resA, resB] = await Promise.all([
              gather(a, sort).then((r) => { updateStep(1, 'done'); return r; }),
              gather(b, sort).then((r) => { updateStep(2, 'done'); return r; }),
            ]);
            updateStep(3, 'active');
            setResult({ comparison: true, query: raw, arms: [{ parsed: a, ...resA }, { parsed: b, ...resB }] });
            updateStep(3, 'done');
            setPhase('compare');
            return;
          }

          if (!parsed || !parsed.condition) {
            setPhase('error');
            setError({ title: 'Could not understand that query', message: 'Try naming a specific condition, drug, or treatment — for example a disease name or a medication.' });
            return;
          }
          const searchType = parsed.searchType || 'disease';
          const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);
          updateStep(0, 'done', `${cap(searchType)} · ${parsed.condition}${parsed.drug ? ` · ${parsed.drug}` : ''}`);

          updateStep(1, 'active'); updateStep(2, 'active');
          const pubmedP = fetchPubMed(parsed, sort)
            .then((r) => { updateStep(1, 'done', `${fmtInt(r.totalAvailable)} studies, ranked by quality`); return r; })
            .catch(() => { updateStep(1, 'error', 'unavailable'); return { ...EMPTY_PM }; });
          const trialsP = fetchTrials(parsed).catch(() => ({ studies: [], count: 0 }));
          const fdaP = fetchFDA(parsed).catch(() => null);

          const [pm, ct, fda] = await Promise.all([pubmedP, trialsP, fdaP]);
          updateStep(2, 'done', `${fmtInt(ct.count)} trials${fda ? ` · OpenFDA: ${fmtInt(fda.totalReports)} reports` : ''}`);

          if (pm.count === 0 && ct.studies.length === 0) { setPhase('nodata'); return; }

          const computedTimeline = computeTimeline(pm.papers);
          updateStep(3, 'active'); updateStep(4, 'active');
          const [profile, synthesis, fullTimeline] = await Promise.all([
            buildProfile(parsed, searchType, pm, ct, fda).then((p) => { updateStep(3, 'done'); return p; }).catch(() => { updateStep(3, 'error'); return null; }),
            synthesizeData(parsed, pm, ct, fda, computedTimeline).then((s) => { updateStep(4, 'done'); return s; }),
            fetchYearHistogram(parsed.pubmedQuery || parsed.condition || '').catch(() => null),
          ]);

          const fetchedAt = new Date().toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
          setResult({ synthesis, profile, searchType, raw: { pubmed: pm, trials: ct, fda, parsed, computedTimeline, fullTimeline, fetchedAt } });
          setPhase('done');
        } catch (e) {
          console.error(e);
          setPhase('error');
          setError({ title: 'Something went wrong', message: e.message || 'An unexpected error occurred while building the synthesis.' });
        }
      }, [updateStep]);

      const onSort = useCallback((mode) => { if (mode !== sortMode && lastQuery.current) runSearch(lastQuery.current, { sort: mode }); }, [sortMode, runSearch]);

      // Deep-link auto-run: a static SEO page's "Get freshest data" button links to
      // /?q=<topic>&run=1, which regenerates that topic live here on the homepage.
      // Homepage searches always run live and never route to a pre-built page.
      useEffect(() => {
        try {
          const q = new URLSearchParams(window.location.search).get('q');
          if (q && q.trim()) runSearch(q.trim());
        } catch (e) {}
      }, [runSearch]);

      const busy = phase === 'loading';
      const showHero = phase !== 'done' && phase !== 'compare';

      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-30 bg-canvas/85 backdrop-blur border-b border-edge">
            <div className="max-w-[1200px] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
              <button onClick={() => { setPhase('idle'); setResult(null); setError(null); }} className="flex items-center gap-2.5">
                <span className="w-9 h-9 rounded-lg bg-primary text-white flex items-center justify-center shadow-card"><Icon name="search" className="w-5 h-5" /></span>
                <span className="font-display text-xl text-ink">Clinical<span className="text-primary">Lens</span></span>
              </button>
              <span className="hidden sm:inline text-xs font-medium text-sub bg-white border border-edge px-3 py-1.5 rounded-full">Live · PubMed · ClinicalTrials.gov · OpenFDA</span>
            </div>
          </header>

          <main className="max-w-[1200px] mx-auto px-4 sm:px-6 pb-20">
            {showHero && (
              <div className={`${phase === 'idle' ? 'pt-16 sm:pt-24' : 'pt-10'} pb-2 transition-all`}>
                {phase === 'idle' && (
                  <div className="text-center mb-8 fade-up">
                    <h1 className="font-display text-4xl sm:text-5xl text-ink leading-tight">A clearer lens on clinical evidence</h1>
                    <p className="text-base sm:text-lg text-sub mt-4 max-w-2xl mx-auto leading-relaxed">Type any condition, drug, or treatment — or compare two with "A vs B". ClinicalLens pulls live data from PubMed, ClinicalTrials.gov, and OpenFDA, ranks it by study quality, and synthesizes a sourced, statistically honest summary.</p>
                  </div>
                )}
                <div className="max-w-3xl mx-auto"><SearchBar onSearch={runSearch} busy={busy} /></div>
              </div>
            )}

            {phase === 'loading' && <LoadingState steps={steps} />}
            {phase === 'error' && error && <ErrorState title={error.title} message={error.message} onRetry={() => runSearch(lastQuery.current)} />}
            {phase === 'nodata' && (
              <ErrorState
                title="Limited published data on this topic"
                message="We found little or no indexed evidence for that query. This may mean it is very rare, newly emerging, or primarily researched in non-English literature. Try a broader term or one of these:"
                suggestions={EXAMPLE_CHIPS} onPick={runSearch} />
            )}
            {phase === 'done' && result && <Dashboard query={query} synthesis={result.synthesis} raw={result.raw} profile={result.profile} searchType={result.searchType} sortMode={sortMode} onSort={onSort} onBroaden={() => onSort('date')} />}
            {phase === 'compare' && result && <ComparisonDashboard query={result.query} arms={result.arms} />}
            {phase === 'idle' && <div className="max-w-3xl mx-auto mt-16"><About /></div>}
          </main>

          <footer className="border-t border-edge">
            <div className="max-w-[1200px] mx-auto px-4 sm:px-6 py-6 text-xs text-sub flex flex-col sm:flex-row items-center justify-between gap-2">
              <span>ClinicalLens · Live data from PubMed · ClinicalTrials.gov · OpenFDA · Synthesis by Claude</span>
              <span>For informational purposes only — not medical advice.</span>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
